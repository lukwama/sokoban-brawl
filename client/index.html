<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sokoban Brawl</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="tab-bar" role="tablist" aria-label="Main">
    <button type="button" class="tab-btn active" data-tab="game" role="tab" aria-selected="true" aria-controls="panelGame" id="tabGame" title="單人遊戲">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6"/><path d="M12 15v.01"/><path d="M8 12V8a4 4 0 0 1 8 0v4"/></svg>
    </button>
    <button type="button" class="tab-btn" data-tab="multi" role="tab" aria-selected="false" aria-controls="panelMulti" id="tabMulti" title="多人遊戲">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <button type="button" class="tab-btn" data-tab="editor" role="tab" aria-selected="false" aria-controls="panelEditor" id="tabEditor" title="關卡編輯器">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>
    <button type="button" class="tab-btn" data-tab="leaderboard" role="tab" aria-selected="false" aria-controls="panelLeaderboard" id="tabLeaderboard" title="排行榜">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    </button>
    <button type="button" class="tab-btn" data-tab="settings" role="tab" aria-selected="false" aria-controls="panelSettings" id="tabSettings" title="設定介面">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </nav>

  <main class="app-main">
    <!-- Game -->
    <section id="panelGame" class="tab-panel active" role="tabpanel" aria-labelledby="tabGame">
      <header class="game-header">
        <div class="level-nav">
          <button type="button" id="btnPrevLevel" class="icon-btn" aria-label="Previous">◀</button>
          <span class="level-title-wrap">
            <span id="levelNum" class="level-num" aria-live="polite">1</span>
            <span id="levelBadge" class="level-badge" hidden>玩家自訂</span>
          </span>
          <button type="button" id="btnNextLevel" class="icon-btn" aria-label="Next">▶</button>
        </div>
        <div class="steps-display">
          <span class="steps-icon" aria-hidden="true">↻</span>
          <span id="gameSteps">0</span>
        </div>
        <div class="header-actions">
          <span id="connectionIcon" class="conn-dot" aria-label="Connection"></span>
          <button type="button" id="btnReset" class="icon-btn" aria-label="Reset">↺</button>
        </div>
      </header>
      <div class="game-area">
        <div id="gameBoard" class="game-board" role="grid" aria-label="Board"></div>
        <div class="controls">
          <div class="dpad">
            <button type="button" id="btnUp" class="icon-btn dpad-btn">↑</button>
            <div class="dpad-mid">
              <button type="button" id="btnLeft" class="icon-btn dpad-btn">←</button>
              <span class="dpad-center"></span>
              <button type="button" id="btnRight" class="icon-btn dpad-btn">→</button>
            </div>
            <button type="button" id="btnDown" class="icon-btn dpad-btn">↓</button>
          </div>
          <div id="swipeHint" class="swipe-hint" hidden>滑動操作</div>
          <button type="button" id="btnUndo" class="icon-btn undo-btn" aria-label="Undo">↶</button>
        </div>
      </div>
      <div id="winOverlay" class="win-overlay" role="dialog" aria-modal="true" aria-label="Complete" hidden aria-hidden="true">
        <div class="win-card">
          <span class="win-icon" aria-hidden="true">✓</span>
          <span class="win-steps"><span id="winSteps">0</span></span>
          <div class="win-actions">
            <button type="button" id="btnSubmitScore" class="icon-btn win-btn" aria-label="Submit">⬆</button>
            <button type="button" id="btnNextLevelAfterWin" class="icon-btn win-btn" aria-label="Next">▶</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Multiplayer -->
    <section id="panelMulti" class="tab-panel" role="tabpanel" aria-labelledby="tabMulti" hidden>
      <div style="padding: 20px; text-align: center; color: var(--text-dim);">
        <h3>多人遊戲</h3>
        <p>即將開放 (Coming Soon)</p>
      </div>
    </section>

    <!-- Editor -->
    <section id="panelEditor" class="tab-panel" role="tabpanel" aria-labelledby="tabEditor" hidden>
      <header class="editor-header">
        <div class="editor-size">
          <button type="button" id="btnWidthMinus" class="icon-btn small" aria-label="Width -">−</button>
          <span id="editorWidth">10</span>
          <button type="button" id="btnWidthPlus" class="icon-btn small" aria-label="Width +">+</button>
          <span class="sep">×</span>
          <button type="button" id="btnHeightMinus" class="icon-btn small" aria-label="Height -">−</button>
          <span id="editorHeight">10</span>
          <button type="button" id="btnHeightPlus" class="icon-btn small" aria-label="Height +">+</button>
        </div>
        <button type="button" id="btnEditorReset" class="icon-btn" aria-label="Reset size">↺</button>
      </header>
      <div class="editor-tools">
        <button type="button" class="tool-btn active" data-tool="#" aria-label="Wall"><div class="tile-preview tp-wall"></div><span class="tool-label">牆</span></button>
        <button type="button" class="tool-btn" data-tool="?" aria-label="Invisible wall"><div class="tile-preview tp-void"></div><span class="tool-label">外牆</span></button>
        <button type="button" class="tool-btn" data-tool="$" aria-label="Box"><div class="tile-preview tp-box"></div><span class="tool-label">箱子</span></button>
        <button type="button" class="tool-btn" data-tool="." aria-label="Target"><div class="tile-preview tp-target"></div><span class="tool-label">目標</span></button>
        <button type="button" class="tool-btn" data-tool="@" aria-label="Player"><div class="tile-preview tp-player"></div><span class="tool-label">玩家</span></button>
        <button type="button" class="tool-btn" data-tool=" " aria-label="Empty"><div class="tile-preview tp-empty"></div><span class="tool-label">空地</span></button>
        <button type="button" class="tool-btn" data-tool="*" aria-label="Box on target"><div class="tile-preview tp-box-on-target"></div><span class="tool-label">達成</span></button>
      </div>
      <div class="editor-area">
        <div id="editorBoard" class="editor-board"></div>
      </div>
      <div class="editor-footer">
        <span id="editorStats" class="editor-stats">▤0 ◎0 ●0</span>
        <button type="button" id="btnEditorSave" class="icon-btn primary" aria-label="Save">💾</button>
      </div>
    </section>

    <!-- Leaderboard (from server, with replay) -->
    <section id="panelLeaderboard" class="tab-panel" role="tabpanel" aria-labelledby="tabLeaderboard" hidden>
      <header class="lb-header">
        <div class="level-nav">
          <button type="button" id="lbPrevLevel" class="icon-btn" aria-label="Prev level">◀</button>
          <span id="lbLevelNum" class="level-num">1</span>
          <button type="button" id="lbNextLevel" class="icon-btn" aria-label="Next level">▶</button>
        </div>
        <button type="button" id="lbRefresh" class="icon-btn" aria-label="Refresh">↻</button>
      </header>
      <div class="lb-body">
        <table class="lb-table">
          <thead>
            <tr><th>#</th><th>玩家</th><th>時間</th><th>↻</th><th>▶</th></tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Settings -->
    <section id="panelSettings" class="tab-panel" role="tabpanel" aria-labelledby="tabSettings" hidden>
      <div class="settings-body">
        <div class="setting-row">
          <span class="setting-icon" aria-hidden="true">🌐</span>
          <input type="text" id="serverUrl" placeholder="https://sokoban.lukwama.com" value="">
        </div>
        <div class="setting-row">
          <span class="setting-icon" aria-hidden="true">👤</span>
          <input type="text" id="playerName" placeholder="Player" maxlength="32" value="">
        </div>
        <div class="setting-row control-setting">
          <span class="setting-icon" aria-hidden="true">🕹️</span>
          <div class="mode-toggle" role="group" aria-label="Control mode">
            <button type="button" id="controlModeAuto" class="mode-btn" data-control-mode="auto">自動</button>
            <button type="button" id="controlModeSwipe" class="mode-btn" data-control-mode="swipe">滑動</button>
            <button type="button" id="controlModeButtons" class="mode-btn" data-control-mode="buttons">按鈕</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/game.js"></script>
</body>
</html>
