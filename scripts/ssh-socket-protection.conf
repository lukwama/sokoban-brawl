# systemd drop-in: SSH socket 預留（Ubuntu 24.04 使用 ssh.socket 監聽）
# 安裝方式: sudo mkdir -p /etc/systemd/system/ssh.socket.d
#          sudo cp scripts/ssh-socket-protection.conf /etc/systemd/system/ssh.socket.d/override.conf
# 然後: sudo systemctl daemon-reload && sudo systemctl restart ssh.socket
#
# 資源保護主要在 ssh.service（見 ssh-resource-protection.conf），此檔可留空或作備註用。
