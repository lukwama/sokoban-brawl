# systemd drop-in: 保護 SSH 服務資源，避免 OOM 或資源不足時被終止
# 安裝方式: sudo cp scripts/ssh-resource-protection.conf /etc/systemd/system/ssh.service.d/override.conf
# 然後: sudo systemctl daemon-reload
#
# Ubuntu 24.04 使用 ssh.service (由 ssh.socket 觸發)，服務名稱為 ssh 而非 sshd

[Service]
# 保證 SSH 至少能使用此記憶體，避免被 OOM killer 優先選中
MemoryMin=64M
# 降低被 OOM killer 選中的機率（-1000 為永不殺、-500 為較少被殺）
OOMScoreAdjust=-500
# 服務異常結束時自動重啟
Restart=on-failure
RestartSec=5
# 給予較高 CPU/IO 權重，資源緊張時仍優先保障 SSH
CPUWeight=100
IOWeight=100
